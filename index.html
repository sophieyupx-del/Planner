<!DOCTYPE html>

<title>Sophie · Planner Hub</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #F6F4EF; color: #1C1917; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 24px; }
  h1 { font-family: 'Lora', serif; font-size: 32px; font-weight: 600; margin-bottom: 6px; }
  h1 em { font-style: italic; color: #7C3ABE; }
  .sub { font-size: 13px; color: #92877F; margin-bottom: 40px; }
  .weeks { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 480px; }
  .week-link { display: flex; align-items: center; justify-content: space-between; background: #fff; border: 1px solid #E3DED7; border-radius: 12px; padding: 16px 20px; text-decoration: none; color: #1C1917; box-shadow: 0 1px 4px rgba(0,0,0,.05); transition: box-shadow .15s, transform .15s; }
  .week-link:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); transform: translateY(-1px); }
  .week-link .wl-left { display: flex; flex-direction: column; gap: 3px; }
  .week-link .wl-title { font-weight: 600; font-size: 14px; }
  .week-link .wl-range { font-size: 11.5px; color: #92877F; }
  .week-link .wl-badge { font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .badge-current { background: #F2EAFB; color: #7C3ABE; border: 1px solid #D8B4F8; }
  .badge-past    { background: #F0FDF4; color: #15803D; border: 1px solid #BBF7D0; }
  .arrow { color: #C4BDB6; font-size: 16px; }
</style>
</head>
